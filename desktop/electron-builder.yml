# electron-builder configuration for the Rhubarb desktop shell.
# Docs: https://www.electron.build/configuration

# appId is the app's INVISIBLE machine identity (registry keys, update
# continuity, install-dir resolution). It keeps the pre-rename value ON
# PURPOSE: changing it would orphan every installed copy. Never touch it.
appId: chaewon.jeopardy.app
productName: Rhubarb

directories:
  output: dist
  buildResources: build

files:
  - main.cjs
  - preload.cjs
  - package.json
  - build/icon.ico

# Bundled next to the app in resources/ — main.cjs reads them from
# process.resourcesPath. Build backend + frontend FIRST (npm run desktop:package
# at the repo root does all three in order).
extraResources:
  - from: ../backend/dist/rhubarb-backend.exe
    to: rhubarb-backend.exe
  - from: ../frontend/dist
    to: frontend-dist
  # Remote play: cloudflared quick-tunnel client (scripts/fetch-cloudflared.cjs
  # downloads it pre-build; a missing file fails the build — never ship without)
  - from: vendor/cloudflared.exe
    to: cloudflared.exe

win:
  target: nsis
  icon: build/icon.ico
  # Version-free on purpose: assets are scoped per-release on GitHub, so one
  # name serves both the auto-updater (latest.yml points at it) and the
  # permanent download link releases/latest/download/Rhubarb-Setup.exe
  # — and the release page shows exactly ONE exe.
  artifactName: "Rhubarb-Setup.${ext}"

# Classic assisted install wizard (not one-click): welcome page, choose the
# install folder, shortcuts, run-after-finish. Defaults to the per-user
# location (%LOCALAPPDATA%\Programs — same as Discord/Slack/VS Code) so no
# admin prompt; the wizard lets anyone pick Program Files if they insist.
# Auto-UPDATES stay silent — the wizard only shows on first install.
nsis:
  oneClick: false
  perMachine: false
  include: build/installer.nsh # kills stray sidecars before install/uninstall
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Rhubarb
  runAfterFinish: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  # keep boards in %APPDATA% on uninstall (default, stated for clarity)
  deleteAppDataOnUninstall: false

fileAssociations:
  - ext: rhubarb
    name: Rhubarb Board
    icon: build/icon.ico
  # Pre-rename boards keep double-click-to-import forever.
  - ext: jeopardy
    name: Rhubarb Board (legacy)
    icon: build/icon.ico

# Auto-update feed: GitHub Releases on this repo. The release workflow
# (.github/workflows/release.yml) publishes on every push to main with a new
# version in desktop/package.json. NOTE: installed apps can only download
# updates if the repo (or at least its releases) is PUBLIC.
publish:
  provider: github
  owner: acohen1
  repo: jeopardy
  releaseType: release
