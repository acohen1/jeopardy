# Fast checks for day-to-day work: every push to dev and every PR.
name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
      - run: |
          cd backend
          uv sync
          uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: |
          cd frontend
          npm ci
          npx tsc --noEmit
          npx vite build
